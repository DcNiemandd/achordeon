# Local Supabase config for Achordeon — Epic 9 (Audience & lobby).
# Run the local stack with `supabase start`. The live lobby path uses only
# Realtime Presence (no database); the database here backs the append-only
# `lobby_events` analytics table (ADR-0003).

project_id = "achordeon"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:4200"
additional_redirect_urls = ["http://127.0.0.1:4200"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
